<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Split Image</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
      }
      #image-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 5px;
        width: 400px;
      }
      .grid-item {
        width: 100%;
        position: relative;
        overflow: hidden;
      }
      .grid-item img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }
      button {
        margin-top: 70px;
        padding: 10px 15px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Split Image into 12 Parts</h1>
    <div id="image-grid"></div>
    <button id="download-btn">Download ZIP</button>
    <script type="module" src="/src/script.ts"></script>
  </body>
</html>
